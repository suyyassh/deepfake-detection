project_name: "deepfake_detection"

# data
data:
 dataset: "faceforensics++"
 raw_dir: "data/raw/faceforensics++"
 img_size: 256
 num_workers: 4

model:
 backbone: "efficientnet_b0"
 pretrained: true
 embedding_dim: 128

train:
 batch_size: 32
 epochs: 50
 learning_rate: 0.0001
 weight_decay: 0.00001